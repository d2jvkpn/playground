llm:
  provider: openai
  config:
    model: gpt-4.1-nano
    openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.1

embedder:
  provider: openai
  config:
    model: text-embedding-3-small
    openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ${DASHSCOPE_API_KEY}

vector_store:
  provider: pgvector
  config:
    host: postgres
    port: 5432
    user: postgres
    password: ${POSTGRES_PASSWORD}
    dbname: postgres
    collection_name: memories
