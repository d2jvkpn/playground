networks:
  net: { name: local, driver: bridge, external: true }

services:
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    networks: ["net"]
    ports: ["9000:9000", "9090:9090"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
    - ./data/minio:/app/data/minio
    command: ["minio", "server", "/app/data/minio"]

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.11
    expose: [2379, 2380]
    networks: ["net"]
    ports: ["127.0.0.1:2379:2379"]
    volumes:
    - ./data/etcd:/app/data/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command:
    - etcd
    - --data-dir=/app/data/etcd
    - --name=milvus-etcd
    - --advertise-client-urls=http://localhost:2379
    - --listen-client-urls=http://0.0.0.0:2379
    - --listen-peer-urls=http://0.0.0.0:2380

  #milvus.svc:
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    depends_on: ["etcd", "minio"]
    networks:
      net:
        aliases: ["milvus-standalone.svc"]
    ports: ["19530:19530", "9091:9091"]
    volumes:
    #- ./configs/milvus.yaml:/milvus/configs/milvus.yaml
    #- ./configs/milvus:/milvus/configs
    - ./data/milvus:/var/lib/milvus
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    command: ["milvus", "run", "standalone"]
