services:
  opencode:
    image: q.local/codebox:latest
    restart: always
    container_name: opencode
    hostname: opencode
    network_mode: bridge
    #networks: [net]
    ports: ["127.0.0.1:4096:4096"] # "127.0.0.1:1455:1455"
    user: appuser:appuser
    volumes:
    - ./data/config:/home/appuser/.config
    - ./data/cache:/home/appuser/.cache
    - ./data/share:/home/appuser/.local/share
    - ./data/state:/home/appuser/.local/state

    - ./data/apps:/home/appuser/apps
    - ./data/workspace:/home/appuser/workspace
    environment:
      TZ: Asia/Shanghai
      # https_proxy: http://127.0.0.1:1080
      # http_proxy: http://127.0.0.1:1080
      # no_proxy: localhost,127.0.0.1,172.17.0.1
      # OPENCODE_SERVER_USERNAME: opencode
      # OPENCODE_SERVER_PASSWORD: ""
    entrypoint: ["/opt/scripts/entrypoint.sh"]
    command: ["opencode", "web", "--hostname=0.0.0.0", "--port=4096"]
    #command: ["opencode", "/path/to/project/with_tui"]
    #command: [sleep, infinity]
