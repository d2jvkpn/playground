server {
	listen       192.168.1.42:80;
	server_name  openclaw.example.domain;
	return       301 https://$server_name$request_uri;
}

server {
	listen         192.168.1.42:443 ssl http2;
	server_name    openclaw.example.domain;
	charset        utf-8;
	server_tokens  off;

	gzip      on;
	gzip_vary on;
	gzip_min_length 1k;
	gzip_types
		text/plain text/css text/xml text/javascript
		application/json application/javascript application/xml application/xml+rss;

	client_max_body_size     12m;
	client_body_buffer_size  16k;

	access_log  /path/to/logs/openclaw.log json;
	error_log   /path/to/nginx/logs/openclaw.error;

	location / {
		proxy_pass             http://127.0.0.1:18789;
		proxy_http_version     1.1;

		proxy_set_header Host  $host;
		proxy_set_header       X-Forwarded-Proto $scheme;
		proxy_set_header       X-Forwarded-Host $host;
		proxy_set_header       X-Forwarded-For $remote_addr;
		proxy_set_header       X-Real-IP $remote_addr;
		proxy_set_header       Upgrade $http_upgrade;
		proxy_set_header       Connection "upgrade";

		proxy_read_timeout  3600;
		proxy_send_timeout  3600;
	}

	ssl_certificate      /path/to/nginx/certs/domain.cer;
	ssl_certificate_key  /path/to/nginx/certs/domain.key;
	ssl_session_cache    shared:SSL:1m;
	ssl_session_timeout  5m;
	ssl_protocols        TLSv1.2 TLSv1.3;
	ssl_ciphers          ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
	ssl_prefer_server_ciphers  on;
}
