services:
  agentic-devbox:
    image: local/agentic-devbox:latest
    restart: always
    container_name: agentic-devbox
    hostname: agentic-devbox
    network_mode: bridge
    #networks: [net]
    ports: ["127.0.0.1:4096:4096", "127.0.0.1:1455:1455"]
    user: appuser:appuser
    volumes:
    - ./data/xdg:/home/appuser/xdg
    - ./data/apps:/home/appuser/apps
    #- ./data/xdg/gemini:/home/appuser/.gemini
    - ./data/workspace:/home/appuser/workspace
    environment:
      TZ: Asia/Shanghai
      # https_proxy: http://127.0.0.1:1080
      # http_proxy: http://127.0.0.1:1080
      # no_proxy: ""
      # OPENCODE_SERVER_USERNAME: opencode
      # OPENCODE_SERVER_PASSWORD: ""
    command: ["opencode", "web", "--cwd=/home/appuser/workspace", "--hostname=0.0.0.0", "--port=4096"]
    #command: ["opencode", "/path/to/project/with_tui"]
    #command: [sleep, infinity]
