server {
    listen 443 ssl;
    server_name app.local.test;

    ssl_certificate     /etc/nginx/certs/local.test.crt;
    ssl_certificate_key /etc/nginx/certs/local.test.key;

    location /authelia {
        internal;

        proxy_pass http://127.0.0.1:9091/api/authz/auth-request;

        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    location / {
        auth_request /authelia;

        auth_request_set $target_url $upstream_http_location;

        error_page 401 =302 https://auth.local.test/?rd=$scheme://$http_host$request_uri;

        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;

        proxy_set_header Remote-User $upstream_http_remote_user;
        proxy_set_header Remote-Groups $upstream_http_remote_groups;
        proxy_set_header Remote-Email $upstream_http_remote_email;
        proxy_set_header Remote-Name $upstream_http_remote_name;
    }
}
