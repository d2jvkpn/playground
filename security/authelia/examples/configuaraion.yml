####
theme: light

server:
  address: tcp://0.0.0.0:9091

log:
  level: debug           # trace, debug, info, warn, error
  format: json           # json or text
  file_path: /logs/authelia.log
  keep_stdout: true

totp:
  issuer: authelia.example.com
  period: 30
  skew: 1
  digits: 6

notifier:
  filesystem:
    filename: /config/notification.txt

#notification:
#  # 生产环境必须使用 SMTP（文件方式功能受限，不支持高可用）[reference:11]
