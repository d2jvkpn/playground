#    #   server_name: smtp.gmail.com

#ntp:
#  #address: 'udp://time.cloudflare.com:123'
#  address: 'udp://ntp.aliyun.com:123'
#  version: 4
#  max_desync: '3s'
#  disable_startup_check: false
#  disable_failure: false

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

####
authentication_backend:
  file:
    path: /config/users_database.yml

storage:
  encryption_key: "change-this-storage-encryption-key-32chars"
  local:
    path: /config/db.sqlite3

  #postgres:
  #  host: postgres.svc
  #  port: 5432
  #  database: authelia
  #  username: authelia
  #  password: "xxxxxxxx"

identity_validation:
  reset_password:
    jwt_secret: "change-this-reset-password-secret"

####
access_control:
  default_policy: deny
  rules:
  - domain: ["whoami.example.com"]
    policy: two_factor

session:
  name: authelia_session
  secret: "change-this-session-secret-change-to-long-random-string"
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
  - domain: "example.com"
    authelia_url: "https://authelia.example.com"
    #default_redirection_url: "https://whoami.example.com"
    #name: "authelia_session"
    #same_site: lax
    #inactivity: 5m
    #expiration: 1h
    #remember_me: 1M
  - domain: openwebui.example.com
    policy: two_factor

