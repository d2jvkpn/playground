services:
  sing-box-proxy:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sing-box-proxy
    restart: always # unless-stopped
    network_mode: bridge
    #networks: [net]
    ports:
    - 127.0.0.1:1080:1080/tcp
    - 172.17.0.1:1080:1080/tcp
    volumes:
    #- ./configs/sing-box.json:/etc/sing-box/config.json:ro
    - ./configs/sing-box.client.json:/app/configs/sing-box.client.json:ro
    - ./logs:/app/logs
    #- /etc/ssl:/etc/ssl:ro # 如果你用真实证书（可选）
    working_dir: /app
    environment:
      TZ: Asia/Shanghai
    command: ["run", "-c", "/app/configs/sing-box.client.json"]
