[supervisord]
nodaemon=true
logfile=/home/appuser/workspace/logs/supervisord.log
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:sing-box]
user=root
directory=/home/appuser/workspace
command=sing-box run -c /home/appuser/workspace/configs/sing-box.tun.json
autostart=true
autorestart=true
startsecs=2
stopsignal=TERM
stopwaitsecs=10
#stdout_logfile=/home/appuser/workspace/logs/sing-box.log
#stderr_logfile=/home/appuser/workspace/logs/sing-box.error

[program:sleep]
user=appuser
directory=/home/appuser/workspace
command=sleep infinity
autostart=true
autorestart=true
startsecs=2
stopsignal=TERM
stopwaitsecs=10
#stdout_logfile=/home/appuser/workspace/logs/sleep.log
#stderr_logfile=/home/appuser/workspace/logs/sleep.error
