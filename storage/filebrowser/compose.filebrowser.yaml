networks:
  net: { name: "local", driver: bridge, external: false }

services:
  filebrowser:
    image: filebrowser/filebrowser:v2
    restart: always
    container_name: filebrowser
    #network_mode: bridge
    networks: ["net"]
    ports: ["3020:3020"]
    user: 1000:1000
    environment:
      TZ: Asia/Shanghai
      USERNAME: filebrowser
      PASSWORD: filebrowser
    volumes:
    - /etc/timezone:/etc/timezone:ro
    - /etc/localtime:/etc/localtime:ro
    - ./configs:/app/configs:ro
    - ./logs:/app/logs/
    - ./data/filebrowser:/app/data/filebrowser
    command:
    - --config=/app/configs/filebrowser.yaml
