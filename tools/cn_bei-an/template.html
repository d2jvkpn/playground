<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: #222;
      background-color: #fff;
    }

    .content {
      flex: 1;
      padding: 24px 16px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.3;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
    }

    footer {
      background-color: #f8f8f8;
      text-align: center;
      padding: 8px 12px;
      border-top: 1px solid #e7e7e7;
      font-size: 12px;
      line-height: 1.8;
      color: #666;
    }

    footer a {
      color: #666;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .content {
        padding: 20px 16px;
      }

      h1 {
        margin-bottom: 12px;
        font-size: 24px;
      }

      p {
        font-size: 15px;
        line-height: 1.7;
      }

      footer {
        padding: 10px 16px;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>欢迎来到我的网站</h1>
    <p>这里是一些网站的内容</p>
  </div>
  <footer>
    <p>
      &copy; {{ year }} {{ copyright }}
      |
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noreferrer">{{ beian }}</a>
    </p>
  </footer>
</body>
</html>
